# Quality Buddy - single-service docker compose
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
#
# Data is persisted in the named volume "qb-data" at /app/data/quality-buddy.db.
# Override settings with an .env file in this directory (see .env.example).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: quality-buddy:latest
    container_name: quality-buddy
    restart: unless-stopped
    ports:
      # LAN-accessible. Change "3001:3001" to "127.0.0.1:3001:3001" to
      # restrict to the host only.
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      QB_DB_PATH: /app/data/quality-buddy.db
      # TZ: "America/Los_Angeles"   # uncomment to set the container timezone
    volumes:
      - qb-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qb-data:
    name: quality-buddy-data
