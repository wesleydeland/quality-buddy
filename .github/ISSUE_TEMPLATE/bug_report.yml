name: Bug report
description: Report something that's broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the sections below
        — the more detail, the faster it can be reproduced and fixed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Fill in what applies — copy from `npm run dev` / `aspire --version` / `node --version` etc.
      placeholder: |
        - OS: macOS 14.4
        - Node: 22.3.0
        - npm: 10.8.0
        - Run mode: dev / Aspire / Docker / production
        - Commit: 1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste terminal output, browser console lines, or attach a screenshot.
    validations:
      required: false
